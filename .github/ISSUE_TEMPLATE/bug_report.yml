name: Bug Report
description: Report a reproducible bug
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Step-by-step minimal reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nullprt version
      placeholder: v1.0.0-rc1
