name: nullprt-ci

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: verify-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure PowerShell
        shell: pwsh
        run: |
          $PSVersionTable

      - name: Detect toolchain
        id: detect
        shell: pwsh
        run: |
          pwsh -File scripts/detect_toolchain.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Bootstrap verify (all OS)
        id: bootstrap
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/bootstrap_verify.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Record bootstrap result to summary
        if: steps.bootstrap.outputs.exit_code != '0'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Bootstrap verification diagnostic (expected in some environments)"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- exit code: ${{ steps.bootstrap.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- note: failure can be expected when toolchain or linker is unavailable."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""

      - name: Cross compile test (all OS)
        id: cross
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/cross_compile_test.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Record cross compile result to summary
        if: steps.cross.outputs.exit_code != '0'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Cross compile diagnostic"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- exit code: ${{ steps.cross.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- note: follow-up required for full cross-target verification."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""

      - name: aegc1 selfhost verify (all OS)
        id: selfhost
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/aegc1_selfhost_verify.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Record selfhost result to summary
        if: steps.selfhost.outputs.exit_code != '0'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Selfhost verification diagnostic"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- exit code: ${{ steps.selfhost.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- note: backend/runtime maturity gap expected at this stage."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""

      - name: Selfhost readiness and test assets (all OS)
        id: smoke
        shell: pwsh
        run: |
          pwsh -File scripts/selfhost_readiness_report.ps1
          $a = $LASTEXITCODE
          pwsh -File tests/aegc1/run_tests.ps1
          $b = $LASTEXITCODE
          $code = if ($a -ne 0) { $a } else { $b }
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Run tests asset report (all OS)
        id: tests
        shell: pwsh
        run: |
          pwsh -File tests/aegc1/run_tests.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify compiler full-completion assets (all OS)
        id: compilerfull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_compiler_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify LSP full-completion assets (all OS)
        id: lspfull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_lsp_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify debugger full-completion assets (all OS)
        id: debugfull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_debugger_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify profiler full-completion assets (all OS)
        id: proffull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_profiler_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify doc full-completion assets (all OS)
        id: docfull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_doc_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify formatter full-completion assets (all OS)
        id: fmtfull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_formatter_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify docs site full-completion assets (all OS)
        id: docssitefull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_docs_site_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify examples full-completion assets (all OS)
        id: examplesfull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_examples_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify release and QA full-completion assets (all OS)
        id: qafull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_release_qa_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify community/ecosystem full-completion assets (all OS)
        id: communityfull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_community_ecosystem_full_completion.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Verify release stable GA readiness assets (all OS)
        id: stablegafull
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/verify_release_stable_ga.ps1
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Enforce required step outcomes
        if: success() || failure()
        shell: pwsh
        run: |
          $smoke = "${{ steps.smoke.outputs.exit_code || '0' }}"
          $tests = "${{ steps.tests.outputs.exit_code || '0' }}"
          if ($smoke -ne "0") {
            Write-Error "Required smoke step failed (exit=$smoke)."
            exit 1
          }
          if ($tests -ne "0") {
            Write-Error "Required tests step failed (exit=$tests)."
            exit 1
          }
          $compilerfull = "${{ steps.compilerfull.outputs.exit_code || '0' }}"
          if ($compilerfull -ne "0") {
            Write-Error "Required compiler full-completion step failed (exit=$compilerfull)."
            exit 1
          }
          $lspfull = "${{ steps.lspfull.outputs.exit_code || '0' }}"
          if ($lspfull -ne "0") {
            Write-Error "Required LSP full-completion step failed (exit=$lspfull)."
            exit 1
          }
          $debugfull = "${{ steps.debugfull.outputs.exit_code || '0' }}"
          if ($debugfull -ne "0") {
            Write-Error "Required debugger full-completion step failed (exit=$debugfull)."
            exit 1
          }
          $proffull = "${{ steps.proffull.outputs.exit_code || '0' }}"
          if ($proffull -ne "0") {
            Write-Error "Required profiler full-completion step failed (exit=$proffull)."
            exit 1
          }
          $docfull = "${{ steps.docfull.outputs.exit_code || '0' }}"
          if ($docfull -ne "0") {
            Write-Error "Required doc full-completion step failed (exit=$docfull)."
            exit 1
          }
          $fmtfull = "${{ steps.fmtfull.outputs.exit_code || '0' }}"
          if ($fmtfull -ne "0") {
            Write-Error "Required formatter full-completion step failed (exit=$fmtfull)."
            exit 1
          }
          $docssitefull = "${{ steps.docssitefull.outputs.exit_code || '0' }}"
          if ($docssitefull -ne "0") {
            Write-Error "Required docs site full-completion step failed (exit=$docssitefull)."
            exit 1
          }
          $examplesfull = "${{ steps.examplesfull.outputs.exit_code || '0' }}"
          if ($examplesfull -ne "0") {
            Write-Error "Required examples full-completion step failed (exit=$examplesfull)."
            exit 1
          }
          $qafull = "${{ steps.qafull.outputs.exit_code || '0' }}"
          if ($qafull -ne "0") {
            Write-Error "Required release/qa full-completion step failed (exit=$qafull)."
            exit 1
          }
          $communityfull = "${{ steps.communityfull.outputs.exit_code || '0' }}"
          if ($communityfull -ne "0") {
            Write-Error "Required community/ecosystem full-completion step failed (exit=$communityfull)."
            exit 1
          }
          Write-Host "Required checks passed. Diagnostic steps may still emit warnings."

      - name: Upload scripts reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.os }}
          path: |
            scripts/*.txt
            tests/aegc1/test_report.txt
          if-no-files-found: warn

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            build/**
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        shell: pwsh
        run: |
          function Add-Report($path, $title) {
            if (Test-Path $path) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### $title"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
              Get-Content $path | Add-Content -Path $env:GITHUB_STEP_SUMMARY
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            }
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Nullprt CI Summary (${{ matrix.os }})"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""

          Add-Report "scripts/bootstrap_verify_report.txt" "bootstrap_verify_report.txt"
          Add-Report "scripts/cross_compile_report.txt" "cross_compile_report.txt"
          Add-Report "scripts/aegc1_selfhost_report.txt" "aegc1_selfhost_report.txt"
          Add-Report "scripts/selfhost_readiness_report.txt" "selfhost_readiness_report.txt"
          Add-Report "scripts/verify_compiler_full_completion_report.txt" "verify_compiler_full_completion_report.txt"
          Add-Report "scripts/verify_lsp_full_completion_report.txt" "verify_lsp_full_completion_report.txt"
          Add-Report "scripts/verify_debugger_full_completion_report.txt" "verify_debugger_full_completion_report.txt"
          Add-Report "scripts/verify_profiler_full_completion_report.txt" "verify_profiler_full_completion_report.txt"
          Add-Report "scripts/verify_doc_full_completion_report.txt" "verify_doc_full_completion_report.txt"
          Add-Report "scripts/verify_formatter_full_completion_report.txt" "verify_formatter_full_completion_report.txt"
          Add-Report "scripts/verify_docs_site_full_completion_report.txt" "verify_docs_site_full_completion_report.txt"
          Add-Report "scripts/verify_examples_full_completion_report.txt" "verify_examples_full_completion_report.txt"
          Add-Report "scripts/verify_release_qa_full_completion_report.txt" "verify_release_qa_full_completion_report.txt"
          Add-Report "scripts/verify_community_ecosystem_full_completion_report.txt" "verify_community_ecosystem_full_completion_report.txt"
          Add-Report "scripts/verify_release_stable_ga_report.txt" "verify_release_stable_ga_report.txt"
          Add-Report "tests/aegc1/test_report.txt" "tests/aegc1/test_report.txt"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Step outcomes"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- detect: ${{ steps.detect.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- bootstrap: ${{ steps.bootstrap.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- cross: ${{ steps.cross.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- selfhost: ${{ steps.selfhost.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- smoke(required): ${{ steps.smoke.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- tests(required): ${{ steps.tests.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- compilerfull(required): ${{ steps.compilerfull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- lspfull(required): ${{ steps.lspfull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- debugfull(required): ${{ steps.debugfull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- proffull(required): ${{ steps.proffull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- docfull(required): ${{ steps.docfull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- fmtfull(required): ${{ steps.fmtfull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- docssitefull(required): ${{ steps.docssitefull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- examplesfull(required): ${{ steps.examplesfull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- qafull(required): ${{ steps.qafull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- communityfull(required): ${{ steps.communityfull.outputs.exit_code }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- stablegafull(required): ${{ steps.stablegafull.outputs.exit_code }}"

  summary:
    needs: [verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate workflow status
        run: |
          echo "verify: ${{ needs.verify.result }}"
          if [[ "${{ needs.verify.result }}" != "success" ]]; then
            echo "Required verify job failed."
            exit 1
          fi
