name: docs-pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate API docs
        shell: pwsh
        run: |
          pwsh -File scripts/generate_api_docs.ps1
      - name: Build static docs site
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path site | Out-Null
          New-Item -ItemType Directory -Force -Path site/examples | Out-Null
          Copy-Item docs/* site/ -Recurse -Force
          if (Test-Path examples) { Copy-Item examples/* site/examples/ -Recurse -Force }
          Copy-Item docs/index.html site/index.html -Force
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
